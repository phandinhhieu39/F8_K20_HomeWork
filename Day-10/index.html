<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Document</title>

        <style>
            .animation-input {
                font-size: 1.5rem;
                width: 50px;
                margin-top: 16px;
                padding: 10px 15px;
                font-size: 1rem;
                border-radius: 99px;
                outline: none;
                border: 1px solid;

                &:hover {
                    width:150px;
                    transition: transform 1s linear 2s;
                }
            }
        </style>
    </head>

    <body>
        <input class="animation-input" type="text" placeholder="Enter" />
    </body>
</html>
